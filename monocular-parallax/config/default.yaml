# Monocular Parallax Tracker — default configuration

camera:
  device: "/dev/video0"
  width: 640
  height: 480
  # 0 = auto-detect hardware maximum via v4l2
  fps: 0

tracking:
  # left | right — functional eye for monocular users
  functional_eye: left
  # MediaPipe model complexity: 0 = fastest
  model_complexity: 0
  refine_landmarks: false

filter:
  # One Euro Filter — low latency with jitter suppression
  type: one_euro
  min_cutoff: 1.5
  beta: 0.007
  d_cutoff: 1.0

calibration:
  gain:
    yaw: 1.0
    pitch: 1.0
    roll: 0.5
    x: 1.0
    y: 1.0
    z: 1.0
  deadzone:
    yaw: 0.02
    pitch: 0.02
    roll: 0.02
    x: 0.005
    y: 0.005
    z: 0.005

output:
  # freetrack | uinput | both
  mode: freetrack
  freetrack:
    host: "127.0.0.1"
    port: 4242
  uinput:
    device_name: "Monocular Parallax Tracker"

daemon:
  # Target loop period in ms (0 = match camera FPS)
  target_period_ms: 0
  # Shared memory / unix socket for GUI live preview
  ipc_socket: "/tmp/parallax-tracker.sock"
